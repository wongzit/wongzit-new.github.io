<body>
  <div id="site-header"></div>

  <main class="container reading" style="max-width:900px">
    <div class="page-head">
      <div class="kicker">// research</div>
      <h1>SCXRD</h1>
      <p class="lead">Single-crystal X-ray structures from my published work.</p>

    <p class="pub-nav">

    <hr class="divider">

    <!-- ====================================================================
         CRYSTAL STRUCTURES
         One <div class="xrd-card"> per structure. Copy a block to add more.
         - Put the structure image at assets/img/scxrd/<name>.png  (square looks best)
         - "CCDC" links to the deposited entry; "DOI" to the paper. Remove a link
           line if you don't have it.
         ==================================================================== -->
    <div class="xrd-grid">

      <div class="xrd-card">
        <img class="xrd-card__img" src="assets/img/scxrd/structure-1.png" alt="Crystal structure"
             onerror="this.style.opacity=.25">
        <div class="xrd-card__body">
          <p class="xrd-card__name">Compound name / label</p>
          <p class="xrd-card__meta">CCDC 0000000 · 2026</p>
          <div class="xrd-card__links">
            <a href="https://www.ccdc.cam.ac.uk/structures/Search?Ccdcid=0000000" target="_blank" rel="noopener">CCDC</a>
            <a href="#" target="_blank" rel="noopener">DOI</a>
          </div>
        </div>
      </div>

      <div class="xrd-card">
        <img class="xrd-card__img" src="assets/img/scxrd/structure-2.png" alt="Crystal structure"
             onerror="this.style.opacity=.25">
        <div class="xrd-card__body">
          <p class="xrd-card__name">Compound name / label</p>
          <p class="xrd-card__meta">CCDC 0000000 · 2025</p>
          <div class="xrd-card__links">
            <a href="https://www.ccdc.cam.ac.uk/structures/Search?Ccdcid=0000000" target="_blank" rel="noopener">CCDC</a>
            <a href="#" target="_blank" rel="noopener">DOI</a>
          </div>
        </div>
      </div>

      <div class="xrd-card">
        <img class="xrd-card__img" src="assets/img/scxrd/structure-3.png" alt="Crystal structure"
             onerror="this.style.opacity=.25">
        <div class="xrd-card__body">
          <p class="xrd-card__name">Compound name / label</p>
          <p class="xrd-card__meta">CCDC 0000000 · 2024</p>
          <div class="xrd-card__links">
            <a href="https://www.ccdc.cam.ac.uk/structures/Search?Ccdcid=0000000" target="_blank" rel="noopener">CCDC</a>
            <a href="#" target="_blank" rel="noopener">DOI</a>
          </div>
        </div>
      </div>

    </div>
  </main>

  <div id="site-footer"></div>

  <script src="assets/js/site.js?v=10"></script>
